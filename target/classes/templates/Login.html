<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CoinVert - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/singin.css">
</head>

<body>

<section class="coinvert-page login-page">

    <header class="coinvert-header">
        <div class="coinvert-header-content">
            <a th:href="@{/coinvert}" href="/coinvert" class="coinvert-brand">
                <img th:src="@{/img/logoverde_sem.jpeg}"
                     src="/img/logoverde_sem.jpeg"
                     alt="CoinVert"
                     class="coinvert-logo">
            </a>
        </div>
    </header>

    <!-- Pop-up de erro vindo do backend -->
    <div th:if="${erro}" id="popupErroBackend" class="coinvert-toast coinvert-toast-error" role="alert">
        <div class="coinvert-toast-icon">
            <i class="bi bi-exclamation-triangle-fill"></i>
        </div>

        <div class="coinvert-toast-content">
            <strong>Erro no login</strong>
            <span th:text="${erro}">E-mail ou senha inválidos.</span>
        </div>

        <button type="button" class="coinvert-toast-close" onclick="fecharPopup('popupErroBackend')">
            <i class="bi bi-x-lg"></i>
        </button>

        <div class="coinvert-toast-progress"></div>
    </div>

    <!-- Pop-up de erro por parâmetro, caso use redirect:/login?error -->
    <div th:if="${param.error}" id="popupErroParam" class="coinvert-toast coinvert-toast-error" role="alert">
        <div class="coinvert-toast-icon">
            <i class="bi bi-exclamation-triangle-fill"></i>
        </div>

        <div class="coinvert-toast-content">
            <strong>Erro no login</strong>
            <span>E-mail ou senha inválidos.</span>
        </div>

        <button type="button" class="coinvert-toast-close" onclick="fecharPopup('popupErroParam')">
            <i class="bi bi-x-lg"></i>
        </button>

        <div class="coinvert-toast-progress"></div>
    </div>

    <!-- Pop-up de sucesso vindo do backend -->
    <div th:if="${sucesso}" id="popupSucessoBackend" class="coinvert-toast coinvert-toast-success" role="alert">
        <div class="coinvert-toast-icon">
            <i class="bi bi-check-circle-fill"></i>
        </div>

        <div class="coinvert-toast-content">
            <strong>Tudo certo</strong>
            <span th:text="${sucesso}">Operação realizada com sucesso.</span>
        </div>

        <button type="button" class="coinvert-toast-close" onclick="fecharPopup('popupSucessoBackend')">
            <i class="bi bi-x-lg"></i>
        </button>

        <div class="coinvert-toast-progress"></div>
    </div>

    <main class="login-main">

        <section class="login-card">

            <a href="javascript:history.back()" class="back-link" aria-label="Voltar">
                <i class="bi bi-arrow-left"></i>
                Voltar
            </a>

            <div class="login-title-area">
                <div class="login-title-icon">
                    <i class="bi bi-box-arrow-in-right"></i>
                </div>

                <div>
                    <h1>Acesse sua conta</h1>
                    <p>Entre para acompanhar sua carteira CoinVert.</p>
                </div>
            </div>

            <form id="loginForm" th:action="@{/login}" action="/login" method="post" novalidate>

                <div class="form-grid">

                    <div class="field-box">
                        <label for="email">E-mail</label>

                        <div class="input-wrapper">
                            <i class="bi bi-envelope"></i>

                            <input type="email"
                                   id="email"
                                   name="email"
                                   placeholder="seuemail@exemplo.com"
                                   autocomplete="email"
                                   required>
                        </div>

                        <small class="field-error" id="erroEmail"></small>
                    </div>

                    <div class="field-box">
                        <label for="senha">Senha</label>

                        <div class="input-wrapper">
                            <i class="bi bi-lock"></i>

                            <input type="password"
                                   id="senha"
                                   name="senha"
                                   placeholder="Digite sua senha"
                                   autocomplete="current-password"
                                   required>

                            <button type="button" class="password-toggle" onclick="alternarSenha()" aria-label="Mostrar ou ocultar senha">
                                <i class="bi bi-eye" id="iconeSenha"></i>
                            </button>
                        </div>

                        <small class="field-error" id="erroSenha"></small>
                    </div>

                </div>

                <button class="login-btn" type="submit">
                    <i class="bi bi-shield-check"></i>
                    Entrar
                </button>

            </form>

            <div class="login-links">
                <p>
                    Não possui uma conta?
                    <a th:href="@{/cadastro}" href="/cadastro">Crie uma aqui</a>
                </p>

                <p>
                    <a th:href="@{/recuperar-senha}" href="/recuperar-senha">
                        Esqueci minha senha
                    </a>
                </p>
            </div>

            <p class="login-copy">&copy; 2025 CoinVert</p>

        </section>

    </main>

</section>


<script src="/js/login.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
