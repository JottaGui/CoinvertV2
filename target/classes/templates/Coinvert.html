<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoinVert - Conversor de Moedas</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Select2 -->
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@ttskch/select2-bootstrap4-theme@1.5.2/dist/select2-bootstrap4.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

  <!-- CSS da página -->
  <link rel="stylesheet" href="/css/Headers.css">

  <meta name="theme-color" content="#0d6efd">
</head>

<body>

<!-- Ícones do modo claro/escuro -->
<svg xmlns="http://www.w3.org/2000/svg" class="d-none">
  <symbol id="check2" viewBox="0 0 16 16">
    <path d="M13.854 3.646a.5.5 0 0 1 0 .708l-7 7a.5.5 0 0 1-.708 0l-3.5-3.5a.5.5 0 1 1 .708-.708L6.5 10.293l6.646-6.647a.5.5 0 0 1 .708 0z"/>
  </symbol>

  <symbol id="circle-half" viewBox="0 0 16 16">
    <path d="M8 15A7 7 0 1 0 8 1v14zm0 1A8 8 0 1 1 8 0a8 8 0 0 1 0 16z"/>
  </symbol>

  <symbol id="moon-stars-fill" viewBox="0 0 16 16">
    <path d="M6 .278a.768.768 0 0 1 .08.858 7.208 7.208 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277.527 0 1.04-.055 1.533-.16a.787.787 0 0 1 .81.316.733.733 0 0 1-.031.893A8.349 8.349 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.752.752 0 0 1 6 .278z"/>
    <path d="M10.794 3.148a.217.217 0 0 1 .412 0l.387 1.162c.173.518.579.924 1.097 1.097l1.162.387a.217.217 0 0 1 0 .412l-1.162.387a1.734 1.734 0 0 0-1.097 1.097l-.387 1.162a.217.217 0 0 1-.412 0l-.387-1.162A1.734 1.734 0 0 0 9.31 6.593l-1.162-.387a.217.217 0 0 1 0-.412l1.162-.387a1.734 1.734 0 0 0 1.097-1.097l.387-1.162z"/>
  </symbol>

  <symbol id="sun-fill" viewBox="0 0 16 16">
    <path d="M8 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/>
    <path d="M8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0z"/>
    <path d="M8 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13z"/>
    <path d="M16 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 16 8z"/>
    <path d="M3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8z"/>
  </symbol>
</svg>

<!-- Botão flutuante de tema -->
<div class="dropdown position-fixed bottom-0 end-0 mb-3 me-3 bd-mode-toggle">
  <button class="btn btn-bd-primary py-2 dropdown-toggle d-flex align-items-center justify-content-center"
          id="bd-theme"
          type="button"
          aria-expanded="false"
          data-bs-toggle="dropdown"
          aria-label="Alternar tema">
    <svg class="bi my-1 theme-icon-active" aria-hidden="true">
      <use href="#circle-half"></use>
    </svg>
    <span class="visually-hidden" id="bd-theme-text">Alternar tema</span>
  </button>

  <ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="bd-theme-text">
    <li>
      <button type="button" class="dropdown-item d-flex align-items-center" data-bs-theme-value="light" aria-pressed="false">
        <svg class="bi me-2 opacity-50" aria-hidden="true">
          <use href="#sun-fill"></use>
        </svg>
        Claro
        <svg class="bi ms-auto d-none" aria-hidden="true">
          <use href="#check2"></use>
        </svg>
      </button>
    </li>

    <li>
      <button type="button" class="dropdown-item d-flex align-items-center" data-bs-theme-value="dark" aria-pressed="false">
        <svg class="bi me-2 opacity-50" aria-hidden="true">
          <use href="#moon-stars-fill"></use>
        </svg>
        Escuro
        <svg class="bi ms-auto d-none" aria-hidden="true">
          <use href="#check2"></use>
        </svg>
      </button>
    </li>

    <li>
      <button type="button" class="dropdown-item d-flex align-items-center active" data-bs-theme-value="auto" aria-pressed="true">
        <svg class="bi me-2 opacity-50" aria-hidden="true">
          <use href="#circle-half"></use>
        </svg>
        Automático
        <svg class="bi ms-auto d-none" aria-hidden="true">
          <use href="#check2"></use>
        </svg>
      </button>
    </li>
  </ul>
</div>

<section class="coinvert-page">

  <!-- Cabeçalho antes do login -->
  <header class="coinvert-header">
    <div class="coinvert-header-content">

      <a href="/coinvert" class="coinvert-brand">
        <img th:src="@{/img/logoverde_sem.jpeg}"
             src="/img/logoverde_sem.jpeg"
             alt="CoinVert"
             class="coinvert-logo">
      </a>

      <div class="coinvert-actions">
        <a href="/login" class="btn-login">Login</a>
        <a href="/cadastro" class="btn-signup">Criar conta</a>
      </div>

    </div>
  </header>

  <!-- Conteúdo principal -->
  <main class="coinvert-main">

    <section class="converter-card">

      <div class="converter-title-area">
        <div class="converter-icon">
          <i class="bi bi-arrow-left-right"></i>
        </div>

        <div>
          <h1>Conversor de moedas</h1>
          <p>Converta moedas com taxas atualizadas em tempo real.</p>
        </div>
      </div>

      <!-- Formulário de conversão -->
      <form action="#"
            th:action="@{/coinvert}"
            method="post"
            hx-post="/coinvert"
            hx-target="#resultado"
            hx-swap="innerHTML"
            hx-trigger="load, change from:select, keyup from:input[name='valor']">

        <div class="converter-form converter-form-public no-buy-button">
          <div class="field-box field-value">
            <label for="valorPrincipal">Valor</label>
            <input id="valorPrincipal"
                   type="number"
                   placeholder="Valor"
                   value="1.00"
                   name="valor"
                   hx-post="/coinvert"
                   hx-target="#resultado"
                   hx-trigger="change delay:0ms, input delay:0ms">
          </div>

          <div class="field-box">
            <label for="origem">De</label>
            <select id="origem" name="origem" hx-trigger="change">
              <option value="">Moeda</option>
              <option value="USD" selected>USD - Dólar Americano</option>
              <option value="EUR">EUR - Euro</option>
              <option value="BRL">BRL - Real Brasileiro</option>
              <option value="GBP">GBP - Libra Esterlina</option>
              <option value="JPY">JPY - Iene Japonês</option>
              <option value="AUD">AUD - Dólar Australiano</option>
              <option value="CAD">CAD - Dólar Canadense</option>
              <option value="CHF">CHF - Franco Suíço</option>
              <option value="CNY">CNY - Yuan Chinês</option>
              <option value="ARS">ARS - Peso Argentino</option>
              <option value="MXN">MXN - Peso Mexicano</option>
              <option value="INR">INR - Rupia Indiana</option>
              <option value="ZAR">ZAR - Rand Sul-Africano</option>
              <option value="RUB">RUB - Rublo Russo</option>
              <option value="KRW">KRW - Won Sul-Coreano</option>
              <option value="TRY">TRY - Lira Turca</option>
              <option value="SEK">SEK - Coroa Sueca</option>
              <option value="NOK">NOK - Coroa Norueguesa</option>
              <option value="DKK">DKK - Coroa Dinamarquesa</option>
              <option value="PLN">PLN - Złoty Polonês</option>
            </select>
          </div>

          <div class="swap-button">
            <i class="bi bi-arrow-left-right"></i>
          </div>

          <div class="field-box">
            <label for="destino">Para</label>
            <select id="destino" name="destino" hx-trigger="change">
              <option value="">Moeda</option>
              <option value="USD">USD - Dólar Americano</option>
              <option value="EUR">EUR - Euro</option>
              <option value="BRL" selected>BRL - Real Brasileiro</option>
              <option value="GBP">GBP - Libra Esterlina</option>
              <option value="JPY">JPY - Iene Japonês</option>
              <option value="AUD">AUD - Dólar Australiano</option>
              <option value="CAD">CAD - Dólar Canadense</option>
              <option value="CHF">CHF - Franco Suíço</option>
              <option value="CNY">CNY - Yuan Chinês</option>
              <option value="ARS">ARS - Peso Argentino</option>
              <option value="MXN">MXN - Peso Mexicano</option>
              <option value="INR">INR - Rupia Indiana</option>
              <option value="ZAR">ZAR - Rand Sul-Africano</option>
              <option value="RUB">RUB - Rublo Russo</option>
              <option value="KRW">KRW - Won Sul-Coreano</option>
              <option value="TRY">TRY - Lira Turca</option>
              <option value="SEK">SEK - Coroa Sueca</option>
              <option value="NOK">NOK - Coroa Norueguesa</option>
              <option value="DKK">DKK - Coroa Dinamarquesa</option>
              <option value="PLN">PLN - Złoty Polonês</option>
            </select>
          </div>



        </div>
      </form>

      <!-- Resultado retornado pelo HTMX -->
      <div id="resultado">
        <div th:fragment="resultado" class="result-wrapper">

          <div class="result-card result-card-green">
            <div class="result-icon">
              <i class="bi bi-graph-up-arrow"></i>
            </div>

            <div>
              <span>Valor atual</span>
              <strong th:text="${cotacao != null ? 'R$ ' + #numbers.formatDecimal(cotacao, 2, 2) : 'Informe um valor válido'}">
                R$ 0,00
              </strong>
            </div>
          </div>

          <div class="result-card result-card-blue">
            <div class="result-icon">
              <i class="bi bi-arrow-repeat"></i>
            </div>

            <div>
              <span>Valor convertido</span>
              <strong th:text="${valorConvertido != null ? 'R$ ' + #numbers.formatDecimal(valorConvertido, 2, 2) : 'R$ 0,00'}">
                R$ 0,00
              </strong>
            </div>
          </div>

        </div>
      </div>

      <!-- Chamada para cadastro/login -->
      <div class="public-cta">
        <div>
          <strong>Deseja comprar moedas?</strong>
          <span>Faça login ou crie sua conta para continuar.</span>
        </div>

        <a href="/cadastro" class="public-cta-button">
          Criar conta
        </a>
      </div>

    </section>

  </main>

</section>

<!-- Scripts -->
<script src="https://unpkg.com/htmx.org@1.9.5"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="/docs/5.3/assets/js/color-modes.js"></script>
<script src="/js/main.js"></script>

</body>
</html>
