<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CoinVert - Cadastro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/cadastro.css">
</head>

<body>

<section class="coinvert-page cadastro-page">

    <header class="coinvert-header">
        <div class="coinvert-header-content">
            <a th:href="@{/Coinvert}" href="/Coinvert" class="coinvert-brand">
                <img th:src="@{/img/logoverde_sem.jpeg}"
                     src="/img/logoverde_sem.jpeg"
                     alt="CoinVert"
                     class="coinvert-logo">
            </a>
        </div>
    </header>

    <div th:if="${erro}" id="popupErroBackend" class="coinvert-toast coinvert-toast-error" role="alert">
        <div class="coinvert-toast-icon">
            <i class="bi bi-exclamation-triangle-fill"></i>
        </div>

        <div class="coinvert-toast-content">
            <strong>Erro no cadastro</strong>
            <span th:text="${erro}">Não foi possível realizar o cadastro.</span>
        </div>

        <button type="button" class="coinvert-toast-close" onclick="fecharPopup('popupErroBackend')">
            <i class="bi bi-x-lg"></i>
        </button>

        <div class="coinvert-toast-progress"></div>
    </div>

    <div th:if="${sucesso}" id="popupSucessoBackend" class="coinvert-toast coinvert-toast-success" role="alert">
        <div class="coinvert-toast-icon">
            <i class="bi bi-check-circle-fill"></i>
        </div>

        <div class="coinvert-toast-content">
            <strong>Cadastro realizado</strong>
            <span th:text="${sucesso}">Sua conta foi criada com sucesso.</span>
        </div>

        <button type="button" class="coinvert-toast-close" onclick="fecharPopup('popupSucessoBackend')">
            <i class="bi bi-x-lg"></i>
        </button>

        <div class="coinvert-toast-progress"></div>
    </div>

    <main class="cadastro-main">

        <section class="cadastro-card">

            <a th:href="@{/login}" href="/login" class="back-link">
                <i class="bi bi-arrow-left"></i>
                Voltar para login
            </a>

            <div class="cadastro-title-area">
                <div class="cadastro-title-icon">
                    <i class="bi bi-person-plus"></i>
                </div>

                <div>
                    <h1>Crie sua conta</h1>
                    <p>Cadastre-se para acessar sua carteira CoinVert.</p>
                </div>
            </div>

            <form id="cadastroForm" th:action="@{/cadastro}" action="/cadastro" method="post" novalidate>

                <div class="form-grid">

                    <div class="field-box">
                        <label for="nome">Nome</label>

                        <div class="input-wrapper">
                            <i class="bi bi-person"></i>
                            <input type="text"
                                   id="nome"
                                   name="nome"
                                   placeholder="Digite seu nome"
                                   autocomplete="name"
                                   required>
                        </div>

                        <small class="field-error" id="erroNome"></small>
                    </div>

                    <div class="field-box">
                        <label for="cpf">CPF</label>

                        <div class="input-wrapper">
                            <i class="bi bi-card-text"></i>
                            <input type="text"
                                   id="cpf"
                                   name="cpf"
                                   maxlength="14"
                                   placeholder="000.000.000-00"
                                   autocomplete="off"
                                   required>
                        </div>

                        <small class="field-error" id="erroCpf"></small>
                    </div>

                    <div class="field-box">
                        <label for="email">E-mail</label>

                        <div class="input-wrapper">
                            <i class="bi bi-envelope"></i>
                            <input type="email"
                                   id="email"
                                   name="email"
                                   placeholder="seuemail@exemplo.com"
                                   autocomplete="email"
                                   required>
                        </div>

                        <small class="field-error" id="erroEmail"></small>
                    </div>

                    <div class="field-box">
                        <label for="senha">Senha</label>

                        <div class="input-wrapper">
                            <i class="bi bi-lock"></i>
                            <input type="password"
                                   id="senha"
                                   name="senha"
                                   placeholder="Digite sua senha"
                                   autocomplete="new-password"
                                   required>

                            <button type="button" class="password-toggle" onclick="alternarSenha()">
                                <i class="bi bi-eye" id="iconeSenha"></i>
                            </button>
                        </div>

                        <small class="field-error" id="erroSenha"></small>
                    </div>

                </div>

                <button type="submit" class="cadastro-btn">
                    <i class="bi bi-check2-circle"></i>
                    Cadastrar
                </button>

            </form>

            <div class="cadastro-footer">
                <span>Já tem uma conta?</span>
                <a th:href="@{/login}" href="/login">Faça login aqui</a>
            </div>

        </section>

    </main>

</section>

<script src="/js/cadastro.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
